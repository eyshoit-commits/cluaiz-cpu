  ### ⬇️ Assets (Downloads)
  * 📄 `install.sh` (Mac/Linux Installer)
  * 📄 `install.ps1` (Windows Installer)
  * 📦 Standalone CLI Bundles (Attached Below)
  * ⚙️ `cluaiz-registry.json` (System-verified background registry)
