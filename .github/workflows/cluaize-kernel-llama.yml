name: "cluaiz Interface Kernels"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0-alpha)'
        required: true
        default: 'alpha-release'

permissions:
  contents: write

concurrency:
  group: "release-kernel-${{ github.ref }}"
  cancel-in-progress: false

env:
  CARGO_BUILD_JOBS: 4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── STAGE 1: Silicon Kernel Compilation (9 OS) ────────────────────
  build-kernels:
    name: "⚙️ Kernel [${{ matrix.platform }}]"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Windows CPU Kernels ---
          - platform: win-x64-avx512
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            ext: dll
            prefix: ""
          - platform: win-x64-avx2
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            ext: dll
            prefix: ""

          # --- Linux CPU Kernels ---
          - platform: linux-x64-avx512
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            ext: so
            prefix: "lib"
          - platform: linux-x64-avx2
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            ext: so
            prefix: "lib"

          # --- Apple Silicon Kernels (Mac) ---
          - platform: mac-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            ext: dylib
            prefix: "lib"
          - platform: mac-x64
            os: macos-latest
            target: x86_64-apple-darwin
            features: ""
            ext: dylib
            prefix: "lib"

          # --- Mobile Kernels (CPU) ---
          # --- Mobile Kernels (CPU) Removed for Monolithic Architecture ---
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: "arm_neon"
            ext: so
            prefix: "lib"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Cargo Registry & Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-kernel-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-kernel-cargo-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure Git (Windows LongPaths)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Build Tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang pkg-config



      # ── The Foundry Kernel Build ──
      - name: Build Kernel (Foundry Strike)
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            rm -f /usr/bin/link
          fi
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cargo install cross --git https://github.com/cross-rs/cross
            cross build --release --target ${{ matrix.target }} -p llama --features "${{ matrix.features }}"
          else
            cargo build --release --target ${{ matrix.target }} -p llama --features "${{ matrix.features }}"
          fi

      # ── Sovereign Kernel Naming ──
      - name: Prepare Sovereign Kernel
        id: naming
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          fi
          
          mkdir -p artifacts
          SRC="target/${{ matrix.target }}/release/${{ matrix.prefix }}cluaiz_llama.${{ matrix.ext }}"
          DEST="artifacts/cluaiz-kernel-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}"
          
          cp "$SRC" "$DEST"
          echo "binary_path=${DEST}" >> $GITHUB_OUTPUT

      - name: 🚀 Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cluaiz-kernel-llama-${{ matrix.platform }}
          path: artifacts/*
          retention-days: 1
