name: cluaiz CLI

on:
  push:
    paths:
      - '/cmd/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0-alpha)'
        required: true
        default: 'alpha-release'

permissions:
  contents: write
  packages: write

env:
  # 🛡️ Sovereign Compliance: Suppress GitHub's internal Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── STAGE 1: CLI Compilation (EXTENDED MATRIX - PC ONLY) ──────────
  build-cli:
    name: 🖥️ Build CLI [${{ matrix.suffix }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win-x64
            ext: exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: win-arm64
            ext: exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            ext: binary
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: binary
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: mac-arm64
            ext: binary
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: mac-x64
            ext: binary

    steps:
      - name: Checkout cluaiz
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install ARM64 Linker (Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV


      - name: Build CLI (Industrial Multi-Platform)
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            cargo build --release --target ${{ matrix.target }} -p cmd
          else
            cargo build --release --target ${{ matrix.target }} -p cmd
          fi
        env:
          OPENSSL_VENDORED: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Sovereign Binary Naming ──
      - name: Prepare Sovereign Binary
        id: naming
        shell: bash
        run: |
          # 💎 Sovereign Versioning Logic
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          fi
          
          SUFFIX="${{ matrix.suffix }}"
          EXT="${{ matrix.ext }}"
          
          if [ "$EXT" == "exe" ]; then
            ORIGINAL="target/${{ matrix.target }}/release/cluaiz.exe"
            DEST="target/${{ matrix.target }}/release/cluaiz-${VERSION}-${SUFFIX}.exe"
          else
            ORIGINAL="target/${{ matrix.target }}/release/cluaiz"
            DEST="target/${{ matrix.target }}/release/cluaiz-${VERSION}-${SUFFIX}"
          fi
          
          mv "$ORIGINAL" "$DEST"
          echo "binary_path=${DEST}" >> $GITHUB_OUTPUT

      - name: 🚀 Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cluaiz-cli-${{ matrix.suffix }}
          path: ${{ steps.naming.outputs.binary_path }}
          retention-days: 1

