name: cluaiz Engine

on:
  push:
    paths:
      - 'cluaiz-engine/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0-alpha)'
        required: true
        default: 'alpha-release'

permissions:
  contents: write
  packages: write

env:
  # 🛡️ Sovereign Compliance: Suppress GitHub's internal Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── STAGE 1: Engine Compilation (HYPER MATRIX) ────────────────────
  build-engine:
    name: ⚙️ Build Engine [${{ matrix.suffix }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win-x64
            ext: dll
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: win-arm64
            ext: dll
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            ext: so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: so
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: mac-arm64
            ext: dylib
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: mac-x64
            ext: dylib
    steps:
      - name: Checkout cluaiz
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Engine (Sovereign Core)
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            cargo install cross --git https://github.com/cross-rs/cross
            cross build --release --target ${{ matrix.target }} -p engines
          else
            cargo build --release --target ${{ matrix.target }} -p engines
          fi
        env:
          OPENSSL_VENDORED: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Sovereign Binary Naming ──
      - name: Prepare Sovereign Binary
        id: naming
        shell: bash
        run: |
          # 💎 Sovereign Versioning Logic
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          fi
          
          SUFFIX="${{ matrix.suffix }}"
          EXT="${{ matrix.ext }}"
          
          if [ "$EXT" == "dll" ]; then
            SRC="target/${{ matrix.target }}/release/engines.dll"
          elif [ "$EXT" == "a" ]; then
            SRC="target/${{ matrix.target }}/release/libengines.a"
          else
            if [ -f "target/${{ matrix.target }}/release/libengines.${EXT}" ]; then
              SRC="target/${{ matrix.target }}/release/libengines.${EXT}"
            else
              SRC="target/${{ matrix.target }}/release/engines.${EXT}"
            fi
          fi
          
          DEST="target/${{ matrix.target }}/release/cluaiz-engine-${VERSION}-${SUFFIX}.${EXT}"
          mv "$SRC" "$DEST"
          echo "binary_path=${DEST}" >> $GITHUB_OUTPUT

      - name: 🚀 Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cluaiz-engine-${{ matrix.suffix }}
          path: ${{ steps.naming.outputs.binary_path }}
          retention-days: 1
