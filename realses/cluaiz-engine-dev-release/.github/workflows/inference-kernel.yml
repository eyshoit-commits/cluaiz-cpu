name: "Cluaiz Interface Kernels"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0-alpha)'
        required: true
        default: 'dev-release'

permissions:
  contents: write

concurrency:
  group: "release-kernel-${{ github.ref }}"
  cancel-in-progress: false

env:
  CARGO_BUILD_JOBS: 4
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── STAGE 1: Silicon Kernel Compilation (9 OS) ────────────────────
  build-kernels:
    name: "⚙️ Kernel [${{ matrix.platform }}]"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Windows CPU Kernels ---
          - platform: win-x64-avx512
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            ext: dll
            prefix: ""
          - platform: win-x64-avx2
            os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            ext: dll
            prefix: ""

          # --- Linux CPU Kernels ---
          - platform: linux-x64-avx512
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            ext: so
            prefix: "lib"
          - platform: linux-x64-avx2
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            ext: so
            prefix: "lib"

          # --- Apple Silicon Kernels (Mac) ---
          - platform: mac-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            features: ""
            ext: dylib
            prefix: "lib"
          - platform: mac-x64
            os: macos-latest
            target: x86_64-apple-darwin
            features: ""
            ext: dylib
            prefix: "lib"

          # --- Mobile Kernels (CPU) ---
          - platform: android-arm64
            os: ubuntu-latest
            target: aarch64-linux-android
            features: "arm_neon"
            ext: so
            prefix: "lib"
          - platform: ios-arm64
            os: macos-latest
            target: aarch64-apple-ios
            features: ""
            ext: a
            prefix: "lib"
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            features: "arm_neon"
            ext: so
            prefix: "lib"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Cargo Registry & Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-kernel-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-kernel-cargo-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure Git (Windows LongPaths)
        if: runner.os == 'Windows'
        run: git config --global core.longpaths true

      - name: Setup MSVC Developer Command Prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Build Tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang pkg-config

      - name: Setup Android NDK (Modern)
        if: matrix.platform == 'android-arm64'
        run: |
          sudo apt-get update && sudo apt-get install -y unzip
          curl -L "https://dl.google.com/android/repository/android-ndk-r25c-linux.zip" -o ndk.zip
          unzip -q ndk.zip
          NDK_PATH=$(pwd)/android-ndk-r25c
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Setup iOS Toolchain
        if: matrix.platform == 'ios-arm64'
        shell: bash
        run: |
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDKROOT=${SDK_PATH}" >> $GITHUB_ENV
          echo "IPHONEOS_DEPLOYMENT_TARGET=16.0" >> $GITHUB_ENV
          echo "CARGO_TARGET_AARCH64_APPLE_IOS_LINKER=clang" >> $GITHUB_ENV
          rustup target add aarch64-apple-ios

      # ── The Foundry Kernel Build ──
      - name: Build Kernel (Foundry Strike)
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            rm -f /usr/bin/link
          fi
          if [[ "${{ matrix.target }}" == *"-android"* || "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            cargo install cross --git https://github.com/cross-rs/cross
            cross build --release --target ${{ matrix.target }} -p llama --features "${{ matrix.features }}"
          else
            cargo build --release --target ${{ matrix.target }} -p llama --features "${{ matrix.features }}"
          fi

      # ── Sovereign Kernel Naming ──
      - name: Prepare Sovereign Kernel
        id: naming
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          fi
          
          mkdir -p artifacts
          SRC="target/${{ matrix.target }}/release/${{ matrix.prefix }}cluaiz_llama.${{ matrix.ext }}"
          DEST="artifacts/cluaiz-kernel-${VERSION}-${{ matrix.platform }}.${{ matrix.ext }}"
          
          cp "$SRC" "$DEST"
          echo "binary_path=${DEST}" >> $GITHUB_OUTPUT

      - name: 🚀 Release Kernels (Atomic Isolation)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          files: artifacts/*
          tag_name: "${{ github.event_name == 'workflow_dispatch' && format('kernel-{0}', github.event.inputs.tag_name) || github.ref_name }}"
          name: "Cluaiz Interface Kernel Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}"
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── STAGE 2: Registry Synchronization ──────────────────────────────
  publish-registry:
    name: 📂 Synchronize Kernel Registry
    needs: build-kernels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Kernel Manifest JSON
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
            TAG="kernel-${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
            TAG="${{ github.ref_name }}"
          fi
          
          cat <<EOF > cluaiz-kernel.json
          {
            "version": "$VERSION",
            "kernels": {
              "win-x64-avx512": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-kernel-$VERSION-win-x64-avx512.dll",
              "win-x64-avx2": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-kernel-$VERSION-win-x64-avx2.dll",
              "linux-x64-avx512": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-linux-x64-avx512.so",
              "linux-x64-avx2": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-linux-x64-avx2.so",
              "linux-arm64-neon": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-linux-arm64.so",
              "mac-arm64-neon": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-mac-arm64.dylib",
              "mac-x64-avx2": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-mac-x64.dylib",
              "ios-arm64-neon": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-ios-arm64.a",
              "android-arm64-neon": "https://github.com/${{ github.repository }}/releases/download/$TAG/libcluaiz-kernel-$VERSION-android-arm64.so"
            }
          }
          EOF

      - name: 🚀 Upload Manifest to Release
        uses: softprops/action-gh-release@v2
        with:
          files: cluaiz-kernel.json
          tag_name: "${{ github.event_name == 'workflow_dispatch' && format('kernel-{0}', github.event.inputs.tag_name) || github.ref_name }}"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
