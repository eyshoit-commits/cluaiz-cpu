name: Publish Secure Registry

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-registry:
    name: 🔒 Generate Zero-Trust Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # Download all artifacts from the workflow runs associated with the tag's commit
          COMMIT_SHA=$(git rev-list -n 1 ${{ github.event.inputs.tag_name }})
          gh run download -c $COMMIT_SHA --dir artifacts || true

      - name: Run Secure Registry Builder
        run: |
          python3 .github/scripts/secure_registry_builder.py "${{ github.event.inputs.tag_name }}" "${{ github.repository }}"

      - name: 🚀 Upload Registry and Binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cluaiz-registry.json
            artifacts/**/*
          tag_name: ${{ github.event.inputs.tag_name }}
          name: "cluaiz Release ${{ github.event.inputs.tag_name }}"
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
