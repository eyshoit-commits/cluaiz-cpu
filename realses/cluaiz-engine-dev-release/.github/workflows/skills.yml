name: Cluaiz Skills

on:
  push:
    paths:
      - 'skills/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0-alpha)'
        required: true
        default: 'dev-release'

permissions:
  contents: write
  packages: write

env:
  # 🛡️ Sovereign Compliance: Suppress GitHub's internal Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cluaiz
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Package Skills (Dynamic Sovereignty)
        id: build_library
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
            TAG="skills-${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
            TAG="${{ github.ref_name }}"
          fi
          
          mkdir -p dist/library
          echo "{\"version\": \"$VERSION\", \"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\", \"skills\": []}" > dist/skills.json

          find skills -name "manifest.json" | while read manifest_path; do
            skill_dir=$(dirname "$manifest_path")
            skill_id=$(jq -r '.id' "$manifest_path")
            skill_name=$(basename "$skill_dir")
            
            zip_name="${skill_id}.zip"
            (cd "$skill_dir" && zip -r "../../dist/library/$zip_name" .)
            
            jq --arg id "$skill_id" \
               --arg name "$skill_name" \
               --arg zip "$zip_name" \
               --arg tag "$TAG" \
               --arg desc "$(jq -r '.description' "$manifest_path")" \
               '.skills += [{id: $id, name: $name, url: "https://github.com/${{ github.repository }}/releases/download/\($tag)/\($zip)", description: $desc}]' \
               dist/skills.json > dist/tmp.json && mv dist/tmp.json dist/skills.json
          done

      - name: 🚀 Release Skills to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('skills-{0}', github.event.inputs.tag_name) || github.ref_name }}
          name: "Cluaiz Skills Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}"
          body: |
            Cluaiz Ai Skills Library.
            
            ### 🚀 Quick Start
            ```bash
            cluaiz run skill:<skill_id>
            ```
          files: |
            dist/library/*.zip
            dist/skills.json
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


