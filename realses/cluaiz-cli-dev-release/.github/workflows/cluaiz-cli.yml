name: Cluaiz CLI

on:
  push:
    paths:
      - 'Apps/cli/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (e.g. v1.0.0-alpha)'
        required: true
        default: 'dev-release'

permissions:
  contents: write
  packages: write

env:
  # 🛡️ Sovereign Compliance: Suppress GitHub's internal Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── STAGE 1: CLI Compilation (EXTENDED MATRIX - PC ONLY) ──────────
  build-cli:
    name: 🖥️ Build CLI [${{ matrix.suffix }}]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win-x64
            ext: exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            suffix: win-arm64
            ext: exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64
            ext: binary
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
            ext: binary
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: mac-arm64
            ext: binary
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: mac-x64
            ext: binary

    steps:
      - name: Checkout Cluaiz
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build CLI (Industrial Multi-Platform)
        shell: bash
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            cargo install cross --git https://github.com/cross-rs/cross
            cross build --release --target ${{ matrix.target }} -p cli
          else
            cargo build --release --target ${{ matrix.target }} -p cli
          fi
        env:
          OPENSSL_VENDORED: 1
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Sovereign Binary Naming ──
      - name: Prepare Sovereign Binary
        id: naming
        shell: bash
        run: |
          # 💎 Sovereign Versioning Logic
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'dev' }}"
          fi
          
          SUFFIX="${{ matrix.suffix }}"
          EXT="${{ matrix.ext }}"
          
          if [ "$EXT" == "exe" ]; then
            ORIGINAL="target/${{ matrix.target }}/release/cluaiz.exe"
            DEST="target/${{ matrix.target }}/release/cluaiz-${VERSION}-${SUFFIX}.exe"
          else
            ORIGINAL="target/${{ matrix.target }}/release/cluaiz"
            DEST="target/${{ matrix.target }}/release/cluaiz-${VERSION}-${SUFFIX}"
          fi
          
          mv "$ORIGINAL" "$DEST"
          echo "binary_path=${DEST}" >> $GITHUB_OUTPUT

      - name: 🚀 Release to GitHub (Dynamic Tagging)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        with:
          files: ${{ steps.naming.outputs.binary_path }}
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('cli-{0}', github.event.inputs.tag_name) || github.ref_name }}
          name: "Cluaiz CLI Release ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}"
          append_body: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── STAGE 2: CLI Manifest Generation ──────────────────────────────
  publish-cli-manifest:
    name: 📂 Publish CLI Manifest
    needs: build-cli
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout Cluaiz
        uses: actions/checkout@v4

      - name: Generate CLI Manifest JSON
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag_name }}"
            TAG="cli-${{ github.event.inputs.tag_name }}"
          else
            VERSION="${{ github.ref_name }}"
            TAG="${{ github.ref_name }}"
          fi
          
          cat <<EOF > cluaiz-cli.json
          {
            "version": "$VERSION",
            "binaries": {
              "win-x64": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-$VERSION-win-x64.exe",
              "win-arm64": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-$VERSION-win-arm64.exe",
              "linux-x64": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-$VERSION-linux-x64",
              "linux-arm64": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-$VERSION-linux-arm64",
              "mac-arm64": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-$VERSION-mac-arm64",
              "mac-x64": "https://github.com/${{ github.repository }}/releases/download/$TAG/cluaiz-$VERSION-mac-x64"
            }
          }
          EOF

      - name: 🚀 Upload Manifest to Release
        uses: softprops/action-gh-release@v2
        with:
          files: cluaiz-cli.json
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('cli-{0}', github.event.inputs.tag_name) || github.ref_name }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
